name: Sync index.html to mom-fw-ui

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mom-fw
        uses: actions/checkout@v4

      - name: Checkout mom-fw-ui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mom-fw-ui
          path: mom-fw-ui
          token: ${{ secrets.UI_REPO_TOKEN }}

      - name: Sync index.html
        run: |
          cp index.html mom-fw-ui/index.html

      - name: Commit and push to mom-fw-ui
        working-directory: mom-fw-ui
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Sync index.html from mom-fw@${GITHUB_SHA::7}"
          git push
