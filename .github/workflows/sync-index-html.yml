name: Sync index.html to mom-fw-ui

on:
  push:
    branches: [main, master]
    paths:
      - 'index.html'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mom-fw
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout mom-fw-ui
        uses: actions/checkout@v4
        with:
          repository: jermaine-f1/mom-fw-ui
          token: ${{ secrets.MOMFW_UI_PAT }}
          path: mom-fw-ui
          persist-credentials: true

      - name: Copy index.html to mom-fw-ui
        run: cp index.html mom-fw-ui/index.html

      - name: Commit and push to mom-fw-ui
        working-directory: mom-fw-ui
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html — skipping push."
          else
            git commit -m "Sync index.html from mom-fw@${GITHUB_SHA::7}"
            git push origin HEAD
          fi
