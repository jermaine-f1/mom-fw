name: Daily Momentum Dashboard Generation

on:
  schedule:
    # 4:05 PM US Eastern (21:05 UTC during EST, 5:05 PM ET during EDT)
    # Runs weekdays only (Mon-Fri) after US market close
    - cron: '5 21 * * 1-5'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mom_gen.py
        run: python mom_gen.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html — skipping commit."
          else
            git commit -m "Daily momentum dashboard update $(date -u +%Y-%m-%d)"
            git push
          fi
